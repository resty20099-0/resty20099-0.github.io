<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RustX Remake</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:14px;
  border-bottom:1px solid #333;
  position:relative;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  color:red;
  font-weight:bold;
  font-size:22px;
  cursor:pointer;
}

.logo img{
  width:40px;
  height:40px;
  border-radius:50%;
  border:2px solid red;
}

/* CHANNELS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:14px;
  padding:20px;
}

.card{
  background:#181818;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{ transform:scale(1.03); }

.card img{
  width:100%;
  height:130px;
  object-fit:cover;
}

.card h3{
  margin:10px;
  font-size:14px;
}

/* VIDEO LIST */
.video{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px;
  background:#181818;
  margin:10px 20px;
  border-radius:10px;
  cursor:pointer;
}

.video img{
  width:60px;
  height:60px;
  border-radius:10px;
  object-fit:cover;
}

/* VIEW */
#view{
  display:none;
  padding:20px;
}

#player{
  width:100%;
  height:500px;
}

/* BACK */
.back{
  display:none;
  margin:10px 20px;
  padding:10px;
  background:red;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo" onclick="home()">
    <img src="avatar.png">
    RustX Remake
  </div>
</div>

<button class="back" id="backBtn" onclick="back()">← Назад</button>

<div id="grid" class="grid"></div>

<div id="view">
  <div id="player"></div>
  <div id="videos"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* =======================
   📦 КАНАЛЫ (ТЫ РЕДАКТИРУЕШЬ ТУТ)
======================= */

const channels = [
  {
    name:"Marmok",
    avatar:"marmok.png",   // 🔥 файл с GitHub
    videos:[
      {
        title:"Смешной ролик 1",
        url:"https://www.youtube.com/watch?v=ysz5S6PUM-U",
        thumb:"thumb1.jpg"
      },
      {
        title:"Смешной ролик 2",
        url:"https://www.youtube.com/watch?v=ScMzIvxBSi4",
        thumb:"thumb2.jpg"
      }
    ]
  },

  {
    name:"Rust Channel",
    avatar:"rust.png",
    videos:[
      {
        title:"Raid Base",
        url:"https://www.youtube.com/watch?v=ysz5S6PUM-U",
        thumb:"thumb3.jpg"
      }
    ]
  }
];

let currentChannel=null;
let player=null;
let apiReady=false;

/* =======================
   YOUTUBE API
======================= */
function onYouTubeIframeAPIReady(){
  apiReady=true;
}

/* =======================
   HOME (КАНАЛЫ)
======================= */
function renderHome(){
  stopVideo();

  document.getElementById("view").style.display="none";
  document.getElementById("backBtn").style.display="none";

  const grid=document.getElementById("grid");
  grid.style.display="grid";
  grid.innerHTML="";

  channels.forEach((ch,i)=>{
    grid.innerHTML += `
      <div class="card" onclick="openChannel(${i})">
        <img src="${ch.avatar}">
        <h3>${ch.name}</h3>
      </div>
    `;
  });
}

/* =======================
   CHANNEL → VIDEO LIST
======================= */
function openChannel(index){
  currentChannel = channels[index];

  document.getElementById("grid").style.display="none";
  document.getElementById("view").style.display="block";
  document.getElementById("backBtn").style.display="block";

  const box=document.getElementById("videos");
  box.innerHTML="";

  currentChannel.videos.forEach(v=>{
    box.innerHTML += `
      <div class="video" onclick="play('${v.url}')">
        <img src="${v.thumb}">
        <div>${v.title}</div>
      </div>
    `;
  });
}

/* =======================
   PLAY VIDEO
======================= */
function play(url){
  const id=url.match(/v=([^&]+)/)[1];

  if(player){
    player.destroy();
  }

  player=new YT.Player("player",{
    videoId:id,
    playerVars:{
      autoplay:1,
      controls:1
    }
  });
}

/* =======================
   BACK
======================= */
function back(){
  stopVideo();
  renderHome();
}

/* =======================
   STOP
======================= */
function stopVideo(){
  if(player){
    player.destroy();
    player=null;
  }
  document.getElementById("player").innerHTML="";
}

/* =======================
   HOME BUTTON
======================= */
function home(){
  renderHome();
}

/* START */
renderHome();

</script>

</body>
</html>

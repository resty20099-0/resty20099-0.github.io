<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RustX Remake</title>

<style>
:root{
  --bg:#0f0f0f;
  --panel:#181818;
  --panel2:#202020;
  --text:#fff;
  --muted:#aaa;
  --accent:#ff0000;
  --border:#2a2a2a;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* TOPBAR */
.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:56px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  background:#0f0f0f;
  border-bottom:1px solid var(--border);
  z-index:100;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:bold;
  color:var(--accent);
  cursor:pointer;
}

.logo img{
  width:34px;
  height:34px;
  border-radius:50%;
  border:2px solid var(--accent);
}

/* LAYOUT */
.app{
  display:flex;
  margin-top:56px;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#0f0f0f;
  border-right:1px solid var(--border);
  height:calc(100vh - 56px);
  padding:10px;
  position:sticky;
  top:56px;
}

.side-item{
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.side-item:hover{
  background:var(--panel);
}

/* MAIN */
.main{
  flex:1;
  padding:18px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:16px;
}

/* VIDEO CARD */
.card{
  cursor:pointer;
}

.thumb{
  width:100%;
  aspect-ratio:16/9;
  border-radius:14px;
  overflow:hidden;
  background:#000;
}

.thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.card h3{
  font-size:14px;
  margin:8px 0 0;
}

.meta{
  font-size:12px;
  color:var(--muted);
}

/* WATCH */
#watch{
  display:none;
}

.player{
  width:100%;
  aspect-ratio:16/9;
  border-radius:14px;
  overflow:hidden;
}

/* MINI PLAYER */
.mini{
  position:fixed;
  bottom:10px;
  right:10px;
  width:300px;
  height:170px;
  display:none;
  z-index:999;
  border:1px solid var(--border);
  background:#000;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo" onclick="home()">
    <img src="avatar.png">
    RustX Remake
  </div>
</div>

<div class="app">

  <div class="sidebar">
    <div class="side-item" onclick="home()">🏠 Главная</div>
    <div class="side-item">🔥 Тренды</div>
    <div class="side-item">📺 Подписки</div>
  </div>

  <div class="main">

    <!-- HOME -->
    <div id="home" class="grid"></div>

    <!-- WATCH -->
    <div id="watch">
      <div id="player" class="player"></div>
      <h2 id="title"></h2>
      <div class="meta" id="channel"></div>
    </div>

  </div>

</div>

<div id="mini" class="mini"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

const channels = [
  {
    name:"Marmok",
    avatar:"marmok.png",
    videos:[
      {
        title:"Смешной ролик",
        url:"https://www.youtube.com/watch?v=ysz5S6PUM-U",
        thumb:"https://img.youtube.com/vi/ysz5S6PUM-U/hqdefault.jpg"
      },
      {
        title:"Ещё видео",
        url:"https://www.youtube.com/watch?v=ScMzIvxBSi4",
        thumb:"https://img.youtube.com/vi/ScMzIvxBSi4/hqdefault.jpg"
      }
    ]
  }
];

let player=null;

/* HOME */
function home(){
  stop();

  document.getElementById("watch").style.display="none";

  const grid=document.getElementById("home");
  grid.style.display="grid";
  grid.innerHTML="";

  channels.forEach(c=>{
    c.videos.forEach(v=>{
      grid.innerHTML += `
        <div class="card" onclick="openVideo('${v.url}','${c.name}')">
          <div class="thumb">
            <img src="${v.thumb}">
          </div>
          <h3>${v.title}</h3>
          <div class="meta">${c.name}</div>
        </div>
      `;
    });
  });
}

/* OPEN VIDEO */
function openVideo(url, channel){
  const id=url.match(/v=([^&]+)/)[1];

  document.getElementById("home").style.display="none";
  document.getElementById("watch").style.display="block";

  document.getElementById("title").innerText="Видео";
  document.getElementById("channel").innerText=channel;

  if(player){
    player.destroy();
  }

  player=new YT.Player("player",{
    videoId:id,
    playerVars:{autoplay:1,controls:1}
  });
}

/* STOP */
function stop(){
  if(player){
    player.destroy();
    player=null;
  }
}

/* INIT */
home();

</script>

</body>
</html>

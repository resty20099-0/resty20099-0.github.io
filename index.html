<!DOCTYPE html>
<html>
<head>
  <title>Rusted Warfare Videos</title>
</head>
<body>

<h1>Rusted Warfare Videos</h1>

<input id="search" placeholder="Поиск..." />
<button onclick="loadVideos()">Найти</button>

<div id="videos"></div>

<script>
const API_KEY = "ТВОЙ_API_KEY";

async function loadVideos() {
  const query = document.getElementById("search").value || "rusted warfare";

  const res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${query}&maxResults=6&type=video&key=${API_KEY}`
  );

  const data = await res.json();
  const container = document.getElementById("videos");
  container.innerHTML = "";

  data.items.forEach(video => {
    const div = document.createElement("div");

    div.innerHTML = `
      <h3>${video.snippet.title}</h3>
      <iframe 
        width="560" 
        height="315"
        src="https://www.youtube.com/embed/${video.id.videoId}"
        allowfullscreen>
      </iframe>
    `;

    container.appendChild(div);
  });
}

loadVideos();
</script>

</body>
</html>

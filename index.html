<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RustX Remake PRO</title>

<style>
:root{
  --bg:#0f0f0f;
  --panel:#181818;
  --text:#f1f1f1;
  --accent:#ff0000;
  --border:#303030;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  padding:14px 18px;
  border-bottom:1px solid var(--border);
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
  color:var(--accent);
  font-size:22px;
  font-weight:bold;
}

.logo img{
  width:40px;
  height:40px;
  border-radius:50%;
  border:2px solid var(--accent);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
  padding:20px;
}

.card{
  background:var(--panel);
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card h3{
  margin:0;
  padding:10px;
  font-size:14px;
}

/* VIEW */
.view{
  display:none;
  padding:20px;
}

#player{
  width:100%;
  height:500px;
}

/* BACK */
.back{
  display:none;
  margin:10px 20px;
  padding:10px 14px;
  background:var(--accent);
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* MINI PLAYER */
#miniPlayer{
  position:fixed;
  bottom:10px;
  right:10px;
  width:280px;
  height:160px;
  display:none;
  z-index:9999;
  border:2px solid var(--accent);
  background:#000;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo" onclick="goHome()">
    <img src="avatar.png">
    RustX Remake
  </div>
</div>

<button class="back" id="backBtn" onclick="back()">← Назад</button>

<div id="grid" class="grid"></div>

<div id="view" class="view">
  <div id="player"></div>
</div>

<div id="miniPlayer"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* ======================
   📺 КАНАЛЫ
====================== */
const channels = [
  {
    id:"rust",
    name:"Rust Gameplay",
    avatar:"https://i.pravatar.cc/150?img=1",
    videos:[
      {
        title:"Рейд база",
        url:"https://www.youtube.com/watch?v=ysz5S6PUM-U",
        thumb:"https://img.youtube.com/vi/ysz5S6PUM-U/hqdefault.jpg"
      },
      {
        title:"PvP бой",
        url:"https://www.youtube.com/watch?v=ScMzIvxBSi4",
        thumb:"https://img.youtube.com/vi/ScMzIvxBSi4/hqdefault.jpg"
      }
    ]
  }
];

let currentChannel=null;
let ytPlayer=null;
let lastTime=0;
let currentVideoId=null;

/* ======================
   CHANNELS
====================== */
function renderChannels(){
  currentChannel=null;

  document.getElementById("view").style.display="none";
  document.getElementById("backBtn").style.display="none";

  const grid=document.getElementById("grid");
  grid.style.display="grid";
  grid.innerHTML="";

  channels.forEach(ch=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <img src="${ch.avatar}">
      <h3>${ch.name}</h3>
    `;
    div.onclick=()=>openChannel(ch.id);
    grid.appendChild(div);
  });
}

/* ======================
   OPEN CHANNEL
====================== */
function openChannel(id){
  currentChannel=channels.find(c=>c.id===id);

  const grid=document.getElementById("grid");
  grid.innerHTML="";

  currentChannel.videos.forEach(v=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <img src="${v.thumb}">
      <h3>${v.title}</h3>
    `;
    div.onclick=()=>openVideo(v.url);
    grid.appendChild(div);
  });
}

/* ======================
   YT READY
====================== */
function onYouTubeIframeAPIReady(){}

/* ======================
   OPEN VIDEO (PRO)
====================== */
function openVideo(url){
  const id=url.match(/v=([^&]+)/)[1];
  currentVideoId=id;

  document.getElementById("grid").style.display="none";
  document.getElementById("view").style.display="block";
  document.getElementById("backBtn").style.display="block";

  if(ytPlayer){
    ytPlayer.loadVideoById(id);
    return;
  }

  ytPlayer=new YT.Player("player",{
    videoId:id,
    playerVars:{
      autoplay:1,
      controls:1
    },
    events:{
      onReady:(e)=>{
        if(lastTime>0){
          e.target.seekTo(lastTime);
        }
        e.target.playVideo();
      }
    }
  });
}

/* ======================
   BACK (NO BACKGROUND AUDIO FIX)
====================== */
function back(){
  if(ytPlayer){
    lastTime=ytPlayer.getCurrentTime();
    ytPlayer.stopVideo(); // 🔥 убирает звук полностью
  }

  document.getElementById("view").style.display="none";
  document.getElementById("grid").style.display="grid";
  document.getElementById("backBtn").style.display="none";

  if(currentChannel) openChannel(currentChannel.id);
  else renderChannels();
}

/* ======================
   HOME
====================== */
function goHome(){
  if(ytPlayer){
    ytPlayer.stopVideo();
  }
  renderChannels();
}

/* ======================
   AUTO SAVE TIME
====================== */
setInterval(()=>{
  if(ytPlayer){
    lastTime=ytPlayer.getCurrentTime();
  }
},3000);

/* START */
renderChannels();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RustX Remake</title>

<style>
:root {
  --bg:#0f0f0f;
  --panel:#181818;
  --text:#f1f1f1;
  --muted:#aaa;
  --accent:#ff0000;
  --border:#303030;
}

body {
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  padding:14px 18px;
  border-bottom:1px solid var(--border);
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
  color:var(--accent);
  font-size:22px;
  font-weight:bold;
  transition:0.2s;
}

.logo:hover{
  transform:scale(1.03);
}

.logo img{
  width:40px;
  height:40px;
  border-radius:50%;
  border:2px solid var(--accent);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
  padding:20px;
}

/* CARD */
.card{
  background:var(--panel);
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card h3{
  margin:0;
  padding:10px;
  font-size:14px;
}

/* VIEW */
.view{
  display:none;
  padding:20px;
}

iframe{
  width:100%;
  height:500px;
  border:none;
  border-radius:10px;
}

/* BACK */
.back{
  display:none;
  margin:10px 20px;
  padding:10px 14px;
  background:var(--accent);
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.fade{
  animation:fade .25s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(5px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo" onclick="goHome()">
    <img src="avatar.png" />
    RustX Remake
  </div>
</div>

<button class="back" id="backBtn" onclick="back()">← Назад</button>

<div id="grid" class="grid"></div>

<div id="view" class="view">
  <iframe id="player"></iframe>
</div>

<script>

/* ======================
   📺 КАНАЛЫ (редактируешь тут)
====================== */
const channels = [
  {
    id:"rust",
    name:"Rust Gameplay",
    avatar:"https://i.pravatar.cc/150?img=1",
    videos:[
      {
        title:"Рейд база",
        url:"https://www.youtube.com/watch?v=ysz5S6PUM-U",
        thumb:"https://img.youtube.com/vi/ysz5S6PUM-U/hqdefault.jpg"
      },
      {
        title:"PvP момент",
        url:"https://www.youtube.com/watch?v=ScMzIvxBSi4",
        thumb:"https://img.youtube.com/vi/ScMzIvxBSi4/hqdefault.jpg"
      }
    ]
  },
  {
    id:"mods",
    name:"Rust Mods",
    avatar:"https://i.pravatar.cc/150?img=2",
    videos:[
      {
        title:"ТОП моды",
        url:"https://www.youtube.com/watch?v=Rkwo_U-ARl8",
        thumb:"https://img.youtube.com/vi/Rkwo_U-ARl8/hqdefault.jpg"
      }
    ]
  }
];

let currentChannel=null;

/* ======================
   📺 КАНАЛЫ
====================== */
function renderChannels(){
  currentChannel=null;

  document.getElementById("view").style.display="none";
  document.getElementById("backBtn").style.display="none";

  const grid=document.getElementById("grid");
  grid.style.display="grid";
  grid.innerHTML="";
  grid.classList.add("fade");

  channels.forEach(ch=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <img src="${ch.avatar}">
      <h3>${ch.name}</h3>
    `;
    div.onclick=()=>openChannel(ch.id);
    grid.appendChild(div);
  });
}

/* ======================
   🎬 КАНАЛ
====================== */
function openChannel(id){
  currentChannel=channels.find(c=>c.id===id);

  const grid=document.getElementById("grid");
  grid.innerHTML="";
  grid.classList.add("fade");

  currentChannel.videos.forEach(v=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <img src="${v.thumb}">
      <h3>${v.title}</h3>
    `;
    div.onclick=()=>openVideo(v.url);
    grid.appendChild(div);
  });
}

/* ======================
   ▶ ВИДЕО
====================== */
function openVideo(url){
  const id=url.match(/v=([^&]+)/)[1];

  document.getElementById("grid").style.display="none";
  document.getElementById("view").style.display="block";
  document.getElementById("backBtn").style.display="block";

  document.getElementById("player").src=
    `https://www.youtube.com/embed/${id}`;
}

/* ======================
   🏠 HOME
====================== */
function goHome(){
  renderChannels();
}

/* ======================
   🔙 BACK
====================== */
function back(){
  if(document.getElementById("view").style.display==="block"){
    document.getElementById("view").style.display="none";
    document.getElementById("grid").style.display="grid";
    document.getElementById("backBtn").style.display="none";

    if(currentChannel) openChannel(currentChannel.id);
    else renderChannels();
  } else {
    renderChannels();
  }
}

/* START */
renderChannels();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rustex Remake</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 18px;
  border-bottom: 1px solid #222;
}

.left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 2px solid red;
  object-fit: cover;
}

h1 {
  margin: 0;
  font-size: 30px;
  color: red;
}

/* SEARCH */
.search-box {
  display: flex;
  justify-content: center;
  padding: 15px;
  gap: 10px;
}

input {
  width: 300px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  background: red;
  color: white;
  cursor: pointer;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* CARD */
.card {
  background: #1a1a1a;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.03);
}

.card img {
  width: 100%;
}

.card h3 {
  font-size: 13px;
  padding: 10px;
  margin: 0;
}

/* VIEW */
.view {
  display: none;
  padding: 20px;
}

iframe {
  width: 100%;
  height: 450px;
  border-radius: 10px;
  border: none;
}

.back {
  display: none;
  margin: 10px 20px;
}
</style>
</head>

<body>

<header class="header">
  <div class="left">
    <img src="avatar.png" class="avatar" />
    <h1>Rustex Remake</h1>
  </div>
</header>

<div class="search-box">
  <input id="search" placeholder="Поиск каналов..." />
  <button onclick="loadChannels()">Поиск</button>
</div>

<button class="back" id="backBtn" onclick="back()">← Назад</button>

<div id="videos" class="grid"></div>

<div id="view" class="view">
  <iframe id="player"></iframe>
</div>

<script>
const API_KEY = "ТВОЙ_API_KEY";

let mode = "channels";

// 1. ЗАГРУЗКА КАНАЛОВ
async function loadChannels() {
  mode = "channels";

  const query = document.getElementById("search").value || "rusted warfare";

  const res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${query}&type=channel&maxResults=12&key=${API_KEY}`
  );

  const data = await res.json();

  const container = document.getElementById("videos");
  container.innerHTML = "";

  data.items.forEach(item => {
    const channelId = item.snippet.channelId;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${item.snippet.thumbnails.medium.url}" />
      <h3>${item.snippet.channelTitle}</h3>
    `;

    card.onclick = () => loadVideos(channelId);

    container.appendChild(card);
  });
}

// 2. ВИДЕО КАНАЛА
async function loadVideos(channelId) {
  mode = "videos";

  const res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=12&type=video&key=${API_KEY}`
  );

  const data = await res.json();

  const container = document.getElementById("videos");
  container.innerHTML = "";

  data.items.forEach(video => {
    const videoId = video.id.videoId;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${video.snippet.thumbnails.medium.url}" />
      <h3>${video.snippet.title}</h3>
    `;

    card.onclick = () => openVideo(videoId);

    container.appendChild(card);
  });
}

// 3. ОТКРЫТЬ ВИДЕО
function openVideo(videoId) {
  document.getElementById("videos").style.display = "none";
  document.getElementById("view").style.display = "block";
  document.getElementById("backBtn").style.display = "block";

  document.getElementById("player").src =
    `https://www.youtube.com/embed/${videoId}`;
}

// 4. НАЗАД
function back() {
  document.getElementById("videos").style.display = "grid";
  document.getElementById("view").style.display = "none";
  document.getElementById("backBtn").style.display = "none";

  document.getElementById("player").src = "";

  loadChannels();
}

// старт
loadChannels();
</script>

</body>
</html>

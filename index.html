<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rustex Remake</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18px;
  border-bottom: 1px solid #222;
}

.left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 2px solid red;
  object-fit: cover;
}

h1 {
  margin: 0;
  font-size: 30px;
  color: red;
  letter-spacing: 1px;
}

/* SEARCH */
.search-box {
  display: flex;
  justify-content: center;
  padding: 15px;
  gap: 10px;
}

input {
  width: 300px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  background: red;
  color: white;
  cursor: pointer;
}

button:hover {
  background: darkred;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* CARD */
.card {
  background: #1a1a1a;
  border-radius: 12px;
  overflow: hidden;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.02);
}

.card h3 {
  font-size: 14px;
  padding: 10px;
  margin: 0;
}

/* VIDEO */
iframe {
  width: 100%;
  height: 200px;
  border: none;
}
</style>
</head>

<body>

<header class="header">
  <div class="left">
    <img src="avatar.png" class="avatar" />
    <h1>Rustex Remake</h1>
  </div>
</header>

<div class="search-box">
  <input id="search" placeholder="Поиск видео..." />
  <button onclick="loadVideos()">Поиск</button>
</div>

<div id="videos" class="grid"></div>

<script>
const API_KEY = "ТВОЙ_API_KEY";

async function loadVideos() {
  const query = document.getElementById("search").value || "rusted warfare";

  const res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${query}&maxResults=12&type=video&key=${API_KEY}`
  );

  const data = await res.json();

  const container = document.getElementById("videos");
  container.innerHTML = "";

  data.items.forEach(video => {
    const videoId = video.id.videoId;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>
      <h3>${video.snippet.title}</h3>
    `;

    container.appendChild(card);
  });
}

loadVideos();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rustex Remake</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18px;
  border-bottom: 1px solid #222;
}

.left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 2px solid red;
  object-fit: cover;
}

h1 {
  margin: 0;
  font-size: 30px;
  color: red;
}

/* SEARCH */
.search-box {
  display: flex;
  justify-content: center;
  padding: 15px;
  gap: 10px;
}

input {
  width: 300px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  background: red;
  color: white;
  cursor: pointer;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* CARD */
.card {
  background: #1a1a1a;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.03);
}

.card img {
  width: 100%;
}

.card h3 {
  font-size: 13px;
  padding: 10px;
}

/* PLAYER MODE */
.player {
  display: none;
  padding: 20px;
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 15px;
}

.video-box iframe {
  width: 100%;
  height: 420px;
  border-radius: 10px;
}

.sidebar {
  background: #1a1a1a;
  padding: 10px;
  border-radius: 10px;
}

.rec {
  cursor: pointer;
  margin-bottom: 10px;
  font-size: 13px;
}

.back {
  margin: 10px 20px;
  display: none;
}
</style>
</head>

<body>

<header class="header">
  <div class="left">
    <img src="avatar.png" class="avatar" />
    <h1>Rustex Remake</h1>
  </div>
</header>

<div class="search-box" id="searchBox">
  <input id="search" placeholder="Поиск видео..." />
  <button onclick="loadVideos()">Поиск</button>
</div>

<button class="back" id="backBtn" onclick="back()">← Назад</button>

<div id="videos" class="grid"></div>

<!-- PLAYER -->
<div id="player" class="player">
  <div class="video-box">
    <iframe id="mainVideo" allowfullscreen></iframe>
  </div>
  <div class="sidebar" id="sidebar"></div>
</div>

<script>
const API_KEY = "ТВОЙ_API_KEY";

async function loadVideos() {
  const query = document.getElementById("search").value || "rusted warfare";

  const res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${query}&maxResults=12&type=video&key=${API_KEY}`
  );

  const data = await res.json();

  const container = document.getElementById("videos");
  container.innerHTML = "";

  data.items.forEach(video => {
    const videoId = video.id.videoId;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${video.snippet.thumbnails.medium.url}" />
      <h3>${video.snippet.title}</h3>
    `;

    card.onclick = () => openVideo(videoId, query);

    container.appendChild(card);
  });
}

async function openVideo(videoId, query) {
  document.getElementById("videos").style.display = "none";
  document.getElementById("player").style.display = "grid";
  document.getElementById("backBtn").style.display = "block";

  document.getElementById("mainVideo").src =
    `https://www.youtube.com/embed/${videoId}`;

  const res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${query}&maxResults=8&type=video&key=${API_KEY}`
  );

  const data = await res.json();

  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = "<h3>Рекомендации</h3>";

  data.items.forEach(v => {
    const div = document.createElement("div");
    div.className = "rec";
    div.innerText = v.snippet.title;

    div.onclick = () => openVideo(v.id.videoId, query);

    sidebar.appendChild(div);
  });
}

function back() {
  document.getElementById("videos").style.display = "grid";
  document.getElementById("player").style.display = "none";
  document.getElementById("backBtn").style.display = "none";
  document.getElementById("mainVideo").src = "";
}

loadVideos();
</script>

</body>
</html>

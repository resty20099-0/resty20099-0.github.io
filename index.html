<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RustX Remake</title>

<style>
:root{
  --bg:#0f0f0f;
  --panel:#181818;
  --text:#fff;
  --accent:#ff0000;
  --border:#303030;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

.header{
  display:flex;
  align-items:center;
  padding:14px;
  border-bottom:1px solid var(--border);
}

.logo{
  display:flex;
  gap:10px;
  align-items:center;
  cursor:pointer;
  color:var(--accent);
  font-weight:bold;
  font-size:22px;
}

.logo img{
  width:40px;
  height:40px;
  border-radius:50%;
  border:2px solid var(--accent);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
  padding:20px;
}

.card{
  background:var(--panel);
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card h3{
  margin:0;
  padding:10px;
  font-size:14px;
}

#view{
  display:none;
  padding:20px;
}

#player{
  width:100%;
  height:500px;
}

.back{
  display:none;
  margin:10px 20px;
  padding:10px;
  background:var(--accent);
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo" onclick="goHome()">
    <img src="avatar.png">
    RustX Remake
  </div>
</div>

<button class="back" id="backBtn" onclick="back()">← Назад</button>

<div id="grid" class="grid"></div>

<div id="view">
  <div id="player"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* =======================
   📺 DATA
======================= */
const channels = [
  {
    id:"rust",
    name:"Rust Gameplay",
    avatar:"https://i.pravatar.cc/150?img=1",
    videos:[
      {
        title:"Raid",
        url:"https://www.youtube.com/watch?v=ysz5S6PUM-U",
        thumb:"https://img.youtube.com/vi/ysz5S6PUM-U/hqdefault.jpg"
      }
    ]
  }
];

let currentChannel = null;
let player = null;
let apiReady = false;
let pendingId = null;

/* =======================
   YT API READY
======================= */
function onYouTubeIframeAPIReady(){
  apiReady = true;
  if(pendingId){
    createPlayer(pendingId);
    pendingId = null;
  }
}

/* =======================
   HOME
======================= */
function renderChannels(){
  stopVideo();

  currentChannel = null;
  document.getElementById("view").style.display="none";
  document.getElementById("backBtn").style.display="none";

  const grid = document.getElementById("grid");
  grid.style.display="grid";
  grid.innerHTML="";

  channels.forEach(ch=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <img src="${ch.avatar}">
      <h3>${ch.name}</h3>
    `;
    div.onclick=()=>openChannel(ch.id);
    grid.appendChild(div);
  });
}

/* =======================
   CHANNEL
======================= */
function openChannel(id){
  stopVideo();

  currentChannel = channels.find(c=>c.id===id);

  const grid=document.getElementById("grid");
  grid.innerHTML="";

  currentChannel.videos.forEach(v=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <img src="${v.thumb}">
      <h3>${v.title}</h3>
    `;
    div.onclick=()=>openVideo(v.url);
    grid.appendChild(div);
  });
}

/* =======================
   VIDEO
======================= */
function openVideo(url){
  const id = url.match(/v=([^&]+)/)[1];

  document.getElementById("grid").style.display="none";
  document.getElementById("view").style.display="block";
  document.getElementById("backBtn").style.display="block";

  if(!apiReady){
    pendingId = id;
    return;
  }

  createPlayer(id);
}

/* =======================
   CREATE PLAYER (SAFE)
======================= */
function createPlayer(id){

  // 🔥 убиваем старый плеер полностью
  if(player){
    player.destroy();
    player = null;
  }

  document.getElementById("player").innerHTML = "";

  player = new YT.Player("player",{
    videoId:id,
    playerVars:{
      autoplay:1,
      controls:1
    }
  });
}

/* =======================
   STOP VIDEO (CRITICAL FIX)
======================= */
function stopVideo(){
  if(player){
    player.stopVideo();
    player.destroy();
    player = null;
  }
  document.getElementById("player").innerHTML="";
}

/* =======================
   BACK
======================= */
function back(){
  stopVideo();

  document.getElementById("view").style.display="none";
  document.getElementById("grid").style.display="grid";
  document.getElementById("backBtn").style.display="none";

  if(currentChannel) openChannel(currentChannel.id);
  else renderChannels();
}

/* =======================
   HOME BUTTON
======================= */
function goHome(){
  renderChannels();
}

/* START */
renderChannels();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>MiniTube</title>

<style>
body {
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    margin: 0;
}

header {
    background: #202020;
    padding: 15px;
    font-size: 24px;
    display: flex;
    justify-content: space-between;
}

input {
    padding: 5px;
    border-radius: 5px;
    border: none;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 15px;
    padding: 15px;
}

.video {
    background: #181818;
    padding: 10px;
    border-radius: 10px;
    transition: 0.2s;
}

.video:hover {
    transform: scale(1.03);
}

iframe {
    width: 100%;
    height: 180px;
    border-radius: 10px;
}

.title {
    margin-top: 8px;
}
</style>

</head>

<body>

<header>
🔥 MiniTube
<input type="text" id="search" placeholder="Поиск...">
</header>

<div class="container" id="videos"></div>

<script>
const videoData = [
    { id: "Rkwo_U-ARl8", title: "Марин видео" },
    { id: "tgbNymZ7vqY", title: "Пример видео 2" },
    { id: "ysz5S6PUM-U", title: "Пример видео 3" }
];

const container = document.getElementById("videos");
const search = document.getElementById("search");

function renderVideos(list) {
    container.innerHTML = "";
    list.forEach(v => {
        container.innerHTML += `
        <div class="video">
            <iframe src="https://www.youtube.com/embed/${v.id}"></iframe>
            <div class="title">${v.title}</div>
        </div>
        `;
    });
}

search.addEventListener("input", () => {
    const filtered = videoData.filter(v =>
        v.title.toLowerCase().includes(search.value.toLowerCase())
    );
    renderVideos(filtered);
});

renderVideos(videoData);
</script>

</body>
</html>
